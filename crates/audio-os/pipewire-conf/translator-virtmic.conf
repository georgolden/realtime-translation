# PipeWire loopback module config for the realtime-translation app.
#
# Install location: ~/.config/pipewire/pipewire.conf.d/translator-virtmic.conf
# After copying, restart the user-level PipeWire stack:
#     systemctl --user restart pipewire wireplumber pipewire-pulse
#
# This creates two paired nodes:
#   - translator_virtmic_sink   (Audio/Sink)   — our app writes PCM here
#   - translator_virtmic_source (Audio/Source) — meeting clients see this in
#                                                 their mic picker
#
# See docs/DESIGN.md §3.3 for rationale.

context.modules = [
  { name = libpipewire-module-loopback
    args = {
      node.description = "Translator Virtual Mic"
      capture.props = {
        node.name        = "translator_virtmic_sink"
        node.description = "Translator Virtual Mic (sink — written by app)"
        media.class      = "Audio/Sink"
        audio.position   = [ FL FR ]
      }
      playback.props = {
        node.name        = "translator_virtmic_source"
        node.description = "Translator Virtual Mic (source — selectable in meeting clients)"
        media.class      = "Audio/Source"
        audio.position   = [ FL FR ]
        node.passive     = true
      }
    }
  }
]
